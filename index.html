<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Allow Notifications - Earth Insider</title>
    <link rel="icon" type="image/x-icon" href="https://www.earthinsider.in/favicon.ico">
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:50px; background-color: #1a1a1a; color: white;">
    
    <h2>Earth Insider News</h2>
    <p id="status-text" style="font-size: 18px;">Connecting to secure server... Please click <b>Allow</b> when asked.</p>

    <script type="module" defer>
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDf3nXOyLE0Z5vfCNLvHI3A_U8PsVXG3jE",
            projectId: "n8n-notification-push",
            messagingSenderId: "472906773403",
            appId: "1:472906773403:web:d08f0b6b3991790c64673e"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        async function initPushSubscription() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    document.getElementById('status-text').innerText = "Registering Service...";
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js', { scope: './' });
                    await navigator.serviceWorker.ready;
                    
                    document.getElementById('status-text').innerText = "Securing Connection...";
                    const vapidKey = 'BJ4ZSeKIJU4iHS5Bzn8j3tyd9cp6fqTTZFrL7iq47rd5jVLZ2cuEOdM1RXHdJ9-EcHaM18MU_x1VBtetMaaGyN0';
                    const token = await getToken(messaging, { vapidKey, serviceWorkerRegistration: registration });

                    if (token) {
                        document.getElementById('status-text').innerText = "Finalizing...";
                        const response = await fetch('https://n8n-push-live-server.onrender.com/webhook/add-subscriber', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token: token })
                        });

                        if(response.ok) {
                            document.body.innerHTML = "<h2 style='color:#4CAF50'>✅ Subscribed Successfully!</h2>";
                            window.opener?.postMessage({ action: 'permission_granted' }, '*');
                            setTimeout(() => window.close(), 2500);
                        } else {
                            document.getElementById('status-text').innerHTML = `<span style='color:red'>Server Error: ${response.status}</span>`;
                        }
                    }
                } else {
                    document.body.innerHTML = "<h2 style='color:#f44336'>❌ Permission Denied</h2>";
                }
            } catch (error) {
                document.getElementById('status-text').innerHTML = `<br><span style='color:#ff5252; font-size:16px;'><b>System Error:</b> ${error.message}</span>`;
            }
        }

        initPushSubscription();
    </script>
</body>
</html>
