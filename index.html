<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enable Alerts - Earth Insider</title>
<link rel="icon" type="image/x-icon" href="https://www.earthinsider.in/favicon.ico">
<link rel="preconnect" href="https://www.gstatic.com"> <style>
body{ text-align:center; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; margin-top:60px; background-color:#121212; color:#ffffff; padding: 0 15px; }
h2{ font-weight:600; letter-spacing:0.5px; font-size: 24px; }
#status-text{ font-size:15px; color:#b3b3b3; margin-top:20px; line-height:1.6; }
.error{ color:#f44336; font-weight:bold; }
.loader{ border:3px solid #2a2a2a; border-top:3px solid #d32f2f; border-radius:50%; width:26px; height:26px; animation:spin 1s linear infinite; margin:20px auto; display:block; }
@keyframes spin{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
.btn-return{ background-color:#d32f2f; color:white; border:none; padding:12px 28px; border-radius:50px; font-weight:bold; font-size:15px; cursor:pointer; margin-top:25px; transition:0.3s; }
.btn-return:hover{ background-color:#b71c1c; box-shadow:0 4px 15px rgba(211,47,47,0.4); }

/* Desktop Responsiveness */
@media (min-width: 768px) {
    body { margin-top: 100px; }
    h2 { font-size: 34px; }
    #status-text, p { font-size: 20px !important; }
    h2[style] { font-size: 34px !important; }
    .loader { width: 40px; height: 40px; border-width: 4px; margin: 30px auto; }
    .btn-return { font-size: 18px; padding: 16px 40px; margin-top: 35px; }
}
</style>
</head>

<body>
<h2>Earth Insider News</h2>
<div id="loading-spinner" class="loader"></div>
<p id="status-text">
Establishing a secure connection...<br>
Please click <b>Allow</b> in the notification prompt above.
</p>

<script type="module" defer>
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

const firebaseConfig={
apiKey:"AIzaSyDf3nXOyLE0Z5vfCNLvHI3A_U8PsVXG3jE",
projectId:"n8n-notification-push",
messagingSenderId:"472906773403",
appId:"1:472906773403:web:d08f0b6b3991790c64673e"
};

const app=initializeApp(firebaseConfig);
const messaging=getMessaging(app);

window.returnToHome=function(){
window.close();
window.location.href="https://www.earthinsider.in";
};

async function initPushSubscription(){
const statusText=document.getElementById('status-text');
const spinner=document.getElementById('loading-spinner');

try{
let permission = Notification.permission;
if(permission !== 'granted') {
    permission = await Notification.requestPermission();
}

if(permission==='granted'){
statusText.innerHTML="Permission granted.<br>Initializing background service...";
const registration=await navigator.serviceWorker.register('./firebase-messaging-sw.js',{scope:'./'});
await navigator.serviceWorker.ready;
statusText.innerHTML="Background service active.<br>Generating encrypted access token...";
const vapidKey='BJ4ZSeKIJU4iHS5Bzn8j3tyd9cp6fqTTZFrL7iq47rd5jVLZ2cuEOdM1RXHdJ9-EcHaM18MU_x1VBtetMaaGyN0';
const token=await getToken(messaging,{vapidKey,serviceWorkerRegistration:registration});

if(token){
statusText.innerHTML="Token generated successfully.<br>Authenticating with the server...";
const response=await fetch('https://n8n-push-live-server.onrender.com/webhook/add-subscriber',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({token:token})
});

if(response.ok){
spinner.style.display='none';
document.body.innerHTML=
"<h2 style='color:#4CAF50;margin-top:60px;'>✅ Subscription Confirmed</h2>\
<p style='color:#b3b3b3;line-height:1.6;'>You are now successfully registered for real-time updates.<br>This window will close automatically in 2 seconds.</p>";
if(window.opener){
window.opener.postMessage({action:'permission_granted'},'https://www.earthinsider.in');
}
setTimeout(()=>{
window.close();
window.location.href="https://www.earthinsider.in";
},2000);
}else{
spinner.style.display='none';
statusText.innerHTML=
`<span class='error'>Server authentication failed (Error: ${response.status})</span>`;
}
}
}else{
spinner.style.display='none';
document.body.innerHTML=
`
<h2 style='color:#f44336;margin-top:50px;'>❌ Permission Denied</h2>
<p style='color:#b3b3b3;line-height:1.6;padding:0 15px;'>
Push notifications are currently blocked.<br><br>
If this was unintentional, click the <b>Lock Icon (🔒)</b> in your browser's address bar, change the permission to <b>Allow</b>, and reload this page.
</p>
<button class="btn-return" onclick="window.returnToHome()">
Return to Earth Insider
</button>
`;
}
}catch(error){
spinner.style.display='none';
document.body.innerHTML=
`
<h2 style='color:#f44336;margin-top:50px;'>⚠️ System Error</h2>
<p style='color:#b3b3b3;line-height:1.6;'>${error.message}</p>
<button class="btn-return" onclick="window.returnToHome()">
Return to Earth Insider
</button>
`;
}
}

initPushSubscription();
</script>
</body>
</html>
