<!DOCTYPE html>
<html>
<head>
    <title>Allow Notifications - Earth Insider</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:50px; background-color: #1a1a1a; color: white;">
    
    <h2>Earth Insider News</h2>
    <p id="status-text" style="font-size: 18px;">Connecting to secure server... Please click <b>Allow</b> when asked.</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDf3nXOyLE0Z5vfCNLvHI3A_U8PsVXG3jE",
            projectId: "n8n-notification-push",
            messagingSenderId: "472906773403",
            appId: "1:472906773403:web:d08f0b6b3991790c64673e"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        async function startEngine() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    document.getElementById('status-text').innerText = "Registering Background Service...";
                    
                    // FIX 1: Smart Path
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js', { scope: './' });
                    
                    // FIX 2: Wait for Service Worker to be 100% Ready
                    await navigator.serviceWorker.ready;
                    
                    document.getElementById('status-text').innerText = "Generating Secure Token... (Please wait)";
                    const vapidKey = 'BJ4ZSeKIJU4iHS5Bzn8j3tyd9cp6fqTTZFrL7iq47rd5jVLZ2cuEOdM1RXHdJ9-EcHaM18MU_x1VBtetMaaGyN0';
                    
                    const currentToken = await getToken(messaging, { 
                        vapidKey: vapidKey,
                        serviceWorkerRegistration: registration 
                    });

                    if (currentToken) {
                        document.getElementById('status-text').innerText = "Sending to Database...";
                        
                        const response = await fetch('https://n8n-push-live-server.onrender.com/webhook/add-subscriber', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token: currentToken })
                        });

                        if(response.ok) {
                            document.body.innerHTML = "<h2 style='color:#4CAF50'>✅ Subscribed Successfully!</h2><p>Closing window in 2 seconds...</p>";
                            setTimeout(() => window.close(), 2500);
                        } else {
                            document.getElementById('status-text').innerHTML = "<span style='color:red'>Server Webhook Error: " + response.status + "</span>";
                        }
                    }
                } else {
                    document.body.innerHTML = "<h2 style='color:#f44336'>❌ Permission Denied</h2><p>You blocked notifications.</p>";
                }
            } catch (error) {
                // FIX 3: Agar fail hua toh lamba red error dikhayega
                document.getElementById('status-text').innerHTML = "<br><span style='color:#ff5252; font-size:16px;'><b>Error Details:</b> " + error.message + "</span>";
            }
        }

        startEngine();
    </script>
</body>
</html>
