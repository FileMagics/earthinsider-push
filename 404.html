<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - Earth Insider</title>
    <link rel="icon" type="image/x-icon" href="https://www.earthinsider.in/favicon.ico">
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin-top: 100px; 
        }
        h1 { font-size: 100px; margin: 0; color: #d32f2f; letter-spacing: -2px; }
        h2 { margin-top: 10px; font-weight: 400; color: #e0e0e0; }
        p { color: #888; font-size: 16px; margin-bottom: 40px; line-height: 1.6; }
        .btn { 
            background-color: #d32f2f; 
            color: white; 
            padding: 14px 28px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.3s;
            font-size: 16px;
        }
        .btn:hover { background-color: #b71c1c; box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4); }
        .timer { color: #d32f2f; font-weight: bold; }
    </style>
    <script defer>
        setTimeout(function() {
            window.location.href = "https://www.earthinsider.in";
        }, 5000);
    </script>
</head>
<body>
    <h1>404</h1>
    <h2>System Route Not Found</h2>
    <p>The secure endpoint you are looking for does not exist or has been relocated.<br>You are being securely redirected to the main portal in <span id="time" class="timer">5</span> seconds...</p>
    
    <a href="https://www.earthinsider.in" class="btn">Return to Earth Insider</a>
    
    <script defer>
        let timeLeft = 5;
        setInterval(() => {
            timeLeft--;
            if(timeLeft > 0) document.getElementById('time').innerText = timeLeft;
        }, 1000);
    </script>
</body>
</html>
