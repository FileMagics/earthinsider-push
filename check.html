<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Click Test - Earth Insider</title>
    <style>
        body { background-color: #121212; color: #ffffff; text-align: center; font-family: sans-serif; margin-top: 15vh; }
        .success-text { color: #4CAF50; font-size: 26px; font-weight: bold; margin-bottom: 20px;}
        .url-box { background: #222; padding: 15px; border-radius: 8px; display: inline-block; word-break: break-all; max-width: 80%; color: #00ff00; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="test-box" style="display: none;">
        <div class="success-text">✅ Click Test 100% Successful!</div>
        <p>Browser ne same-domain link open kar diya hai.</p>
        <p>Target Article ka URL yeh hai:</p>
        <div class="url-box" id="target-url"></div>
        <p style="margin-top: 30px; color: #888; font-size: 14px;">(Abhi redirect disable kiya hua hai test karne ke liye)</p>
    </div>

    <script defer>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('go');

        if (targetUrl) {
            // Agar link aaya hai (Notification Click), toh UI dikhao, redirect MAT karo
            document.getElementById('test-box').style.display = 'block';
            document.getElementById('target-url').innerText = targetUrl;
        } else {
            // Agar background (Blogger button) se chal raha hai, toh permission check karo
            window.parent.postMessage({ action: 'check_permission', status: Notification.permission }, '*');
        }
    </script>
</body>
</html>
