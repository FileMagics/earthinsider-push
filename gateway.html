<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Gateway - Earth Insider</title>
    <link rel="icon" type="image/x-icon" href="https://www.earthinsider.in/favicon.ico">
    <style>
        body { background-color: #050505; font-family: 'Courier New', Courier, monospace; text-align: center; margin-top: 15vh; margin-bottom: 0; }
        .box { background: #0a0a0a; padding: 40px; border-radius: 4px; display: none; border: 1px solid #1a1a1a; box-shadow: 0 0 15px rgba(0, 255, 0, 0.03); max-width: 500px; margin: 0 auto; text-align: left; }
        .box.restricted { border-color: #331111; box-shadow: 0 0 15px rgba(255, 0, 0, 0.05); text-align: center; }
        h2 { font-weight: normal; letter-spacing: 2px; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; margin-top: 0; text-align: center; }
        .text-green { color: #00ff00; }
        .text-red { color: #ff3333; }
        .text-white { color: #ffffff; }
        .text-gray { color: #888888; }
        .log-line { margin: 12px 0; font-size: 13px; color: #888; }
        .highlight { color: #00ff00; font-weight: bold; }
        .loader-bar { width: 100%; height: 2px; background: #111; margin-top: 30px; position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; position: absolute; left: -50%; top: 0; height: 100%; width: 50%; background: #00ff00; animation: load 1s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
    </style>
</head>
<body>
    <div id="routing-ui" class="box">
        <h2 class="text-white">SECURE ROUTING GATEWAY</h2>
        <div class="log-line">> Initializing secure connection... <span class="highlight">[OK]</span></div>
        <div class="log-line">> Verifying destination payload... <span class="highlight">[OK]</span></div>
        <div class="log-line">> Establishing encrypted tunnel...</div>
        <div class="loader-bar"></div>
    </div>

    <div id="restricted-ui" class="box restricted">
        <h2 class="text-red">ACCESS DENIED</h2>
        <p class="text-white" style="margin-bottom: 10px;">UNAUTHORIZED ENDPOINT REQUEST</p>
        <p class="text-gray" style="font-size: 13px; margin-bottom: 20px;">Missing valid routing parameters. Connection refused.</p>
        <p class="text-gray" style="font-size: 11px;">Earth Insider Security Systems</p>
    </div>

    <script defer>
        const urlParams = new URLSearchParams(window.location.search);
        const destination = urlParams.get('go');

        if (destination) {
            document.getElementById('routing-ui').style.display = 'block';
            setTimeout(() => {
                window.location.replace(destination);
            }, 1000);
        } else {
            document.getElementById('restricted-ui').style.display = 'block';
        }
    </script>
</body>
</html>
